<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartClean - Cleaning Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { padding: 20px 20px 80px; background: var(--bg-light); }
        .photo-preview { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-top: 12px; }
        .photo-item { position: relative; border-radius: var(--radius-md); overflow: hidden; }
        .photo-item img { width: 100%; height: 150px; object-fit: cover; }
        .photo-remove { position: absolute; top: 8px; right: 8px; background: var(--error); color: white; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; }
        .form-section { background: var(--white); padding: 20px; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="language-selector">
        <label data-i18n="language">Language</label>
        <div class="language-toggle">
            <button id="lang-en" class="active" onclick="switchLanguage('en')">🇺🇸 EN</button>
            <button id="lang-ja" onclick="switchLanguage('ja')">🇯🇵 JP</button>
        </div>
    </div>

    <div class="container">
        <h1><i class="fas fa-clipboard-check"></i> <span data-i18n="cleaning.title">Classroom Cleaning Submission</span></h1>
        
        <form id="cleaningForm">
            <div class="form-section">
                <h3 data-i18n="cleaning.studentInfo">Student Information</h3>
                <div class="form-group">
                    <label class="form-label" data-i18n="cleaning.selectClassroom">Select Classroom</label>
                    <select id="classroomSelect" class="form-control" required>
                        <option value="">-- Select Classroom --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="cleaning.studentName">Student Name</label>
                    <input type="text" id="studentName" class="form-control" readonly>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="cleaning.date">Date</label>
                    <input type="text" id="date" class="form-control" readonly>
                </div>
            </div>

            <div class="form-section">
                <h3 data-i18n="cleaning.checklist">Cleaning Checklist</h3>
                <p data-i18n="cleaning.checklistInstructions">Check all completed cleaning tasks</p>
                <div class="form-check"><input type="checkbox" id="floor" name="floor"><label for="floor" data-i18n="cleaning.tasks.floor">Floor swept and mopped</label></div>
                <div class="form-check"><input type="checkbox" id="desks" name="desks"><label for="desks" data-i18n="cleaning.tasks.desks">Desks and chairs cleaned</label></div>
                <div class="form-check"><input type="checkbox" id="blackboard" name="blackboard"><label for="blackboard" data-i18n="cleaning.tasks.blackboard">Blackboard cleaned</label></div>
                <div class="form-check"><input type="checkbox" id="windows" name="windows"><label for="windows" data-i18n="cleaning.tasks.windows">Windows cleaned</label></div>
                <div class="form-check"><input type="checkbox" id="trash" name="trash"><label for="trash" data-i18n="cleaning.tasks.trash">Trash emptied</label></div>
                <div class="form-check"><input type="checkbox" id="organize" name="organize"><label for="organize" data-i18n="cleaning.tasks.organize">Items organized</label></div>
                <div class="form-check"><input type="checkbox" id="air" name="air"><label for="air" data-i18n="cleaning.tasks.air">Room ventilated</label></div>
            </div>

            <div class="form-section">
                <h3 data-i18n="cleaning.photos">Evidence Photos</h3>
                <p data-i18n="cleaning.photosInstructions">Upload photos of the cleaned classroom (minimum 2 photos)</p>
                <input type="file" id="photoInput" accept="image/*" multiple style="display: none;" onchange="handlePhotoUpload(event)">
                <button type="button" class="btn btn-outline" onclick="document.getElementById('photoInput').click()">
                    <i class="fas fa-camera"></i> <span data-i18n="cleaning.uploadPhotos">Upload Photos</span>
                </button>
                <div id="photoPreview" class="photo-preview"></div>
            </div>

            <div class="form-section">
                <h3 data-i18n="cleaning.additionalNotes">Additional Notes</h3>
                <textarea id="notes" class="form-control" data-i18n-placeholder="cleaning.notesPlaceholder" rows="4"></textarea>
            </div>

            <button type="submit" class="btn btn-success btn-lg">
                <i class="fas fa-paper-plane"></i> <span data-i18n="cleaning.submitForm">Submit Cleaning Report</span>
            </button>
        </form>
    </div>

    <div class="bottom-nav">
        <a href="student-dashboard.html" class="nav-item"><i class="fas fa-home"></i><span data-i18n="nav.home">Home</span></a>
        <a href="cleaning-form.html" class="nav-item active"><i class="fas fa-plus-circle"></i><span data-i18n="student.submitCleaning">Submit</span></a>
        <a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span data-i18n="nav.logout">Logout</span></a>
    </div>

    <script src="js/api-client.js"></script>
    <script src="js/translations.js"></script>
    <script src="js/utils.js"></script>
    <script>
        const user = checkAuth();
        let uploadedPhotos = [];

        document.getElementById('studentName').value = user.name || user.full_name;
        document.getElementById('date').value = formatDate(Date.now(), 'date');

        function switchLanguage(lang) {
            langManager.setLanguage(lang);
            document.querySelectorAll('.language-toggle button').forEach(btn => btn.classList.remove('active'));
            document.getElementById('lang-' + lang).classList.add('active');
            updatePageTranslations();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const currentLang = langManager.getLanguage();
            document.querySelectorAll('.language-toggle button').forEach(btn => btn.classList.remove('active'));
            document.getElementById('lang-' + currentLang).classList.add('active');
            loadClassrooms();
        });

        // Load classrooms from API
        async function loadClassrooms() {
            try {
                const response = await fetch('tables/classrooms?limit=100');
                const data = await response.json();
                
                const select = document.getElementById('classroomSelect');
                select.innerHTML = '<option value="">-- Select Classroom --</option>';
                
                if (data.data && data.data.length > 0) {
                    data.data.forEach(classroom => {
                        const option = document.createElement('option');
                        option.value = classroom.id;
                        option.textContent = `${classroom.room_number} - ${classroom.building || ''} ${classroom.floor || ''}`;
                        option.dataset.roomNumber = classroom.room_number;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Load classrooms error:', error);
                showToast(t('messages.error'), 'error');
            }
        }

        async function handlePhotoUpload(event) {
            const files = Array.from(event.target.files);
            if (files.length === 0) return;

            showLoading();
            try {
                const compressed = await handleFileUpload(files);
                uploadedPhotos = [...uploadedPhotos, ...compressed];
                displayPhotos();
                showToast(t('messages.uploadSuccess'), 'success');
            } catch (error) {
                showToast(t('messages.error'), 'error');
            } finally {
                hideLoading();
                event.target.value = '';
            }
        }

        function displayPhotos() {
            const container = document.getElementById('photoPreview');
            container.innerHTML = uploadedPhotos.map((photo, idx) => `
                <div class="photo-item">
                    <img src="${photo.dataUrl}" alt="Photo ${idx + 1}">
                    <button type="button" class="photo-remove" onclick="removePhoto(${idx})">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `).join('');
        }

        function removePhoto(index) {
            uploadedPhotos.splice(index, 1);
            displayPhotos();
        }

        document.getElementById('cleaningForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const classroomSelect = document.getElementById('classroomSelect');
            const selectedOption = classroomSelect.options[classroomSelect.selectedIndex];
            
            if (!classroomSelect.value) {
                showToast(t('cleaning.selectClassroomError') || 'Please select a classroom', 'error');
                return;
            }

            if (uploadedPhotos.length < 2) {
                showToast(t('cleaning.validationError') || 'Please upload at least 2 photos', 'error');
                return;
            }

            const formData = {
                classroom_id: classroomSelect.value,
                classroom_number: selectedOption.dataset.roomNumber,
                student_id: user.id,
                student_name: user.name || user.full_name,
                submission_date: Date.now(),
                checklist_floor: document.getElementById('floor').checked,
                checklist_desks: document.getElementById('desks').checked,
                checklist_blackboard: document.getElementById('blackboard').checked,
                checklist_windows: document.getElementById('windows').checked,
                checklist_trash: document.getElementById('trash').checked,
                checklist_organize: document.getElementById('organize').checked,
                checklist_air: document.getElementById('air').checked,
                photos: uploadedPhotos.map(p => p.dataUrl),
                notes: document.getElementById('notes').value,
                status: 'pending',
                score: null,
                teacher_feedback: '',
                reviewed_by: null,
                reviewed_at: null
            };

            showLoading();
            try {
                await fetch('tables/cleaning_submissions', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(formData)
                });

                showToast(t('cleaning.success') || 'Submission successful!', 'success');
                setTimeout(() => window.location.href = 'student-dashboard.html', 1000);
            } catch (error) {
                console.error('Submit error:', error);
                showToast(t('cleaning.error') || 'Submission failed. Please try again.', 'error');
            } finally {
                hideLoading();
            }
        });
    </script>
</body>
</html>
