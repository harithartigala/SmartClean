<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartClean - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { padding: 20px 20px 80px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-box { background: linear-gradient(135deg, #2196F3, #4CAF50); color: white; padding: 20px; border-radius: var(--radius-lg); text-align: center; }
        .stat-value { font-size: 36px; font-weight: 700; margin-bottom: 8px; }
        .stat-label { font-size: 13px; opacity: 0.9; }
        .chart-container { background: white; padding: 20px; border-radius: var(--radius-lg); margin-bottom: 20px; box-shadow: var(--shadow-sm); }
        canvas { max-height: 300px !important; }
        .quick-actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
        .action-btn { display: flex; align-items: center; gap: 12px; padding: 16px; background: var(--white); border: 2px solid var(--primary-blue); border-radius: var(--radius-md); color: var(--primary-blue); text-decoration: none; transition: all 0.2s; }
        .action-btn:hover { background: var(--primary-blue); color: white; }
    </style>
</head>
<body>
    <div class="language-selector">
        <label data-i18n="language">Language</label>
        <div class="language-toggle">
            <button id="lang-en" class="active" onclick="switchLanguage('en')">🇺🇸 EN</button>
            <button id="lang-ja" onclick="switchLanguage('ja')">🇯🇵 JP</button>
        </div>
    </div>

    <div class="container">
        <h1><i class="fas fa-tachometer-alt"></i> <span data-i18n="admin.dashboard">Admin Dashboard</span></h1>
        <p><span data-i18n="admin.welcome">Welcome</span>, <strong id="userName"></strong></p>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-value" id="totalClassrooms">0</div>
                <div class="stat-label" data-i18n="admin.totalClassrooms">Total Classrooms</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="totalStudents">0</div>
                <div class="stat-label" data-i18n="admin.totalStudents">Total Students</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="totalTeachers">0</div>
                <div class="stat-label" data-i18n="admin.totalTeachers">Total Teachers</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="totalSubmissions">0</div>
                <div class="stat-label" data-i18n="admin.totalSubmissions">Total Submissions</div>
            </div>
        </div>

        <div class="row">
            <div class="col-6">
                <div class="chart-container">
                    <h3><i class="fas fa-chart-pie"></i> <span data-i18n="admin.statusDistribution">Status Distribution</span></h3>
                    <canvas id="statusChart"></canvas>
                </div>
            </div>
            <div class="col-6">
                <div class="chart-container">
                    <h3><i class="fas fa-chart-bar"></i> <span data-i18n="admin.scoreDistribution">Score Distribution</span></h3>
                    <canvas id="scoreChart"></canvas>
                </div>
            </div>
        </div>

        <div class="card">
            <h2><i class="fas fa-bolt"></i> <span data-i18n="admin.quickActions">Quick Actions</span></h2>
            <div class="quick-actions">
                <a href="classroom-management.html" class="action-btn">
                    <i class="fas fa-school fa-2x"></i>
                    <span data-i18n="admin.manageClassrooms">Manage Classrooms</span>
                </a>
                <a href="user-management.html" class="action-btn">
                    <i class="fas fa-users-cog fa-2x"></i>
                    <span data-i18n="admin.manageUsers">Manage Users</span>
                </a>
                <a href="qr-management.html" class="action-btn">
                    <i class="fas fa-qrcode fa-2x"></i>
                    <span data-i18n="admin.generateQR">Generate QR Codes</span>
                </a>
                <a href="reports.html" class="action-btn">
                    <i class="fas fa-file-export fa-2x"></i>
                    <span data-i18n="admin.viewReports">View Reports</span>
                </a>
                <a href="#" class="action-btn" onclick="exportAllData()">
                    <i class="fas fa-download fa-2x"></i>
                    <span data-i18n="admin.exportData">Export Data</span>
                </a>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="admin-dashboard.html" class="nav-item active"><i class="fas fa-home"></i><span data-i18n="nav.home">Home</span></a>
        <a href="qr-management.html" class="nav-item"><i class="fas fa-qrcode"></i><span data-i18n="nav.qrCodes">QR</span></a>
        <a href="reports.html" class="nav-item"><i class="fas fa-chart-bar"></i><span data-i18n="nav.reports">Reports</span></a>
        <a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span data-i18n="nav.logout">Logout</span></a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/translations.js"></script>
    <script src="js/utils.js"></script>
    <script>
        const user = checkAuth();
        document.getElementById('userName').textContent = user.name;

        function switchLanguage(lang) {
            langManager.setLanguage(lang);
            document.querySelectorAll('.language-toggle button').forEach(btn => btn.classList.remove('active'));
            document.getElementById('lang-' + lang).classList.add('active');
            updatePageTranslations();
            loadDashboard();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const currentLang = langManager.getLanguage();
            document.querySelectorAll('.language-toggle button').forEach(btn => btn.classList.remove('active'));
            document.getElementById('lang-' + currentLang).classList.add('active');
            loadDashboard();
        });

        async function loadDashboard() {
            try {
                const [classrooms, users, submissions] = await Promise.all([
                    fetch('tables/classrooms').then(r => r.json()),
                    fetch('tables/users').then(r => r.json()),
                    fetch('tables/cleaning_submissions').then(r => r.json())
                ]);

                const students = users.data.filter(u => u.role === 'student');
                const teachers = users.data.filter(u => u.role === 'teacher');

                document.getElementById('totalClassrooms').textContent = classrooms.total || 0;
                document.getElementById('totalStudents').textContent = students.length;
                document.getElementById('totalTeachers').textContent = teachers.length;
                document.getElementById('totalSubmissions').textContent = submissions.total || 0;

                createStatusChart(submissions.data || []);
                createScoreChart(submissions.data || []);
            } catch (error) {
                console.error('Load error:', error);
            }
        }

        function createStatusChart(submissions) {
            const pending = submissions.filter(s => s.status === 'pending').length;
            const approved = submissions.filter(s => s.status === 'approved').length;
            const rejected = submissions.filter(s => s.status === 'rejected').length;

            new Chart(document.getElementById('statusChart'), {
                type: 'doughnut',
                data: {
                    labels: [t('status.pending'), t('status.approved'), t('status.rejected')],
                    datasets: [{
                        data: [pending, approved, rejected],
                        backgroundColor: ['#FF9800', '#4CAF50', '#F44336']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        function createScoreChart(submissions) {
            const approved = submissions.filter(s => s.status === 'approved' && s.score);
            const scores = { '0-60': 0, '61-70': 0, '71-80': 0, '81-90': 0, '91-100': 0 };
            
            approved.forEach(sub => {
                if (sub.score <= 60) scores['0-60']++;
                else if (sub.score <= 70) scores['61-70']++;
                else if (sub.score <= 80) scores['71-80']++;
                else if (sub.score <= 90) scores['81-90']++;
                else scores['91-100']++;
            });

            new Chart(document.getElementById('scoreChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(scores),
                    datasets: [{
                        label: t('admin.scoreDistribution'),
                        data: Object.values(scores),
                        backgroundColor: '#2196F3'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        async function exportAllData() {
            showLoading();
            try {
                const response = await fetch('tables/cleaning_submissions?limit=1000');
                const data = await response.json();
                exportToCSV(data.data, `smartclean_export_${Date.now()}.csv`);
                showToast(t('messages.success'), 'success');
            } catch (error) {
                showToast(t('messages.error'), 'error');
            } finally {
                hideLoading();
            }
        }
    </script>
</body>
</html>
