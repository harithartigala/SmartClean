<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="SmartClean - Smart Classroom Cleaning Management System">
    <meta name="theme-color" content="#2196F3">
    <link rel="manifest" href="manifest.json">
    <title>SmartClean - Login</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #2196F3 0%, #4CAF50 100%);
            padding: 20px;
        }
        
        .login-container {
            background: var(--white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            animation: fadeInUp 0.5s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .app-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #2196F3, #4CAF50);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
        }
        
        .app-icon i {
            font-size: 40px;
            color: var(--white);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #2196F3, #4CAF50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .login-tagline {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .input-icon {
            position: relative;
        }
        
        .input-icon i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }
        
        .input-icon .form-control {
            padding-left: 48px;
        }
        
        .demo-credentials {
            background: var(--light-gray);
            padding: 16px;
            border-radius: var(--radius-md);
            margin-top: 24px;
            font-size: 13px;
        }
        
        .demo-credentials h4 {
            font-size: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .demo-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid var(--medium-gray);
        }
        
        .demo-item:last-child {
            border-bottom: none;
        }
        
        .demo-role {
            font-weight: 600;
        }
        
        .demo-creds {
            color: var(--text-secondary);
            font-family: 'Courier New', monospace;
        }
        
        @media (max-width: 768px) {
            .login-container {
                padding: 30px 20px;
            }
            
            .app-icon {
                width: 70px;
                height: 70px;
            }
            
            .app-icon i {
                font-size: 35px;
            }
        }
    </style>
</head>
<body>
    <!-- Language Selector -->
    <div class="language-selector">
        <label data-i18n="language">Language</label>
        <div class="language-toggle">
            <button id="lang-en" class="active" onclick="switchLanguage('en')">
                <span>🇺🇸</span> EN
            </button>
            <button id="lang-ja" onclick="switchLanguage('ja')">
                <span>🇯🇵</span> JP
            </button>
        </div>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <!-- App Icon -->
        <div class="app-icon">
            <i class="fas fa-broom"></i>
        </div>
        
        <!-- Login Header -->
        <div class="login-header">
            <h1 class="login-title" data-i18n="appName">SmartClean</h1>
            <p class="login-tagline" data-i18n="tagline">Smart Classroom Cleaning Management</p>
        </div>
        
        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" data-i18n="login.username">Username</label>
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input 
                        type="text" 
                        id="username" 
                        class="form-control" 
                        data-i18n-placeholder="login.usernamePlaceholder"
                        placeholder="Enter your username"
                        required
                        autocomplete="username"
                    >
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label" data-i18n="login.password">Password</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-control" 
                        data-i18n-placeholder="login.passwordPlaceholder"
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                </div>
            </div>
            
            <div class="form-check">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember" data-i18n="login.rememberMe">Remember me</label>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg">
                <i class="fas fa-sign-in-alt"></i>
                <span data-i18n="login.loginButton">Login</span>
            </button>
            
            <div style="text-align: center; margin-top: 16px;">
                <p style="color: #666;">
                    <span data-i18n="login.noAccount">Don't have an account?</span>
                    <a href="register.html" style="color: #2196F3; text-decoration: none; font-weight: 600;">
                        <span data-i18n="login.registerNow">Register Now</span>
                    </a>
                </p>
            </div>
        </form>
        
        <!-- Demo Credentials -->
        <div class="demo-credentials">
            <h4>
                <i class="fas fa-info-circle"></i>
                <span data-i18n="login.demoCredentials">Demo Credentials</span>
            </h4>
            <div class="demo-item">
                <span class="demo-role">
                    <i class="fas fa-user-graduate"></i>
                    <span data-i18n="login.student">Student</span>
                </span>
                <span class="demo-creds">student1 / student123</span>
            </div>
            <div class="demo-item">
                <span class="demo-role">
                    <i class="fas fa-chalkboard-teacher"></i>
                    <span data-i18n="login.teacher">Teacher</span>
                </span>
                <span class="demo-creds">teacher1 / teacher123</span>
            </div>
            <div class="demo-item">
                <span class="demo-role">
                    <i class="fas fa-user-shield"></i>
                    <span data-i18n="login.admin">Administrator</span>
                </span>
                <span class="demo-creds">admin / admin123</span>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api-client.js"></script>
    <script src="js/translations.js"></script>
    <script src="js/utils.js"></script>
    
    <script>
        // Language Switcher
        function switchLanguage(lang) {
            langManager.setLanguage(lang);
            
            // Update button states
            document.querySelectorAll('.language-toggle button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById('lang-' + lang).classList.add('active');
            
            // Update all translations
            updatePageTranslations();
        }
        
        // Initialize language on load
        document.addEventListener('DOMContentLoaded', () => {
            const currentLang = langManager.getLanguage();
            document.querySelectorAll('.language-toggle button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById('lang-' + currentLang).classList.add('active');
        });
        
        // Login Form Handler - Cloudflare D1 Authentication
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!username || !password) {
                showToast(t('login.requiredFields'), 'error');
                return;
            }
            
            showLoading();
            
            try {
                // Authenticate via Cloudflare Worker API
                const response = await apiClient.login({
                    username: username,
                    password: password
                });
                
                if (response.success && response.user) {
                    // Save user session locally
                    setCurrentUser(response.user);
                    showToast(t('login.loginSuccess'), 'success');
                    
                    // Redirect based on role
                    setTimeout(() => {
                        switch (response.user.role) {
                            case 'student':
                                window.location.href = 'student-dashboard.html';
                                break;
                            case 'teacher':
                                window.location.href = 'teacher-dashboard.html';
                                break;
                            case 'admin':
                                window.location.href = 'admin-dashboard.html';
                                break;
                            default:
                                window.location.href = 'student-dashboard.html';
                        }
                    }, 500);
                } else {
                    showToast(t('login.loginError'), 'error');
                }
            } catch (error) {
                console.error('Login error:', error);
                
                // Handle specific error messages
                if (error.message.includes('Invalid credentials')) {
                    showToast(t('login.loginError') || 'Invalid username or password', 'error');
                } else if (error.message.includes('timeout')) {
                    showToast('Connection timeout. Please check your internet connection.', 'error');
                } else if (error.message.includes('Unauthorized')) {
                    showToast('Account not authorized. Please contact administrator.', 'error');
                } else {
                    showToast(t('messages.error') || 'Login failed. Please try again.', 'error');
                }
            } finally {
                hideLoading();
            }
        });
    </script>
</body>
</html>
